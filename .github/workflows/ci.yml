name: VNKey Professional CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # 1. Rust Core: Test, Lint, and Format
  test-rust-core:
    name: Rust Core (Test & Lint)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust (${{ matrix.rust }})
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "core -> target"

    - name: Check Formatting
      run: cargo fmt --all -- --check
      working-directory: core

    - name: Run Tests
      run: cargo test --verbose
      working-directory: core

    - name: Run Clippy
      run: cargo clippy -- -D warnings
      working-directory: core

  # 2. Windows Build: DLL and EXE Artifacts
  build-windows-wpf:
    name: Windows Build & Artifacts
    runs-on: windows-latest
    needs: test-rust-core
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install Rust (Windows)
      uses: dtolnay/rust-toolchain@stable
      
    - name: Rust Cache (Windows)
      uses: Swatinem/rust-cache@v2

    - name: Build Rust Core DLL
      run: cargo build --release
      working-directory: core

    - name: Setup Native DLL for WPF
      run: |
        mkdir -p platforms/windows/VNKey.Windows/Native
        cp target/release/vnkey_core.dll platforms/windows/VNKey.Windows/Native/
      shell: bash

    - name: Restore dependencies
      run: dotnet restore platforms/windows/VNKey.Windows/VNKey.Windows.csproj

    - name: Build & Publish WPF Project
      run: dotnet publish platforms/windows/VNKey.Windows/VNKey.Windows.csproj --configuration Release --no-restore -o publish

    - name: Ensure Native DLL in Publish Folder
      run: cp target/release/vnkey_core.dll publish/
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VNKey-Latest-Build
        path: publish/
        retention-days: 7
